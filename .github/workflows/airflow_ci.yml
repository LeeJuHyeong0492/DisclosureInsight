name: Airflow DAG CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'dags/**'
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (필수 패키지 설치)
        run: |
          python -m pip install --upgrade pip
          pip install apache-airflow pandas boto3 openai psycopg2-binary bs4 requests python-dotenv

      - name: Syntax Check (파이썬 문법 검사)
        run: |
          echo "DAG 파일의 파이썬 문법을 검사합니다..."
          python -m py_compile dags/dart_collection_dag.py
          echo "문법 검사 통과 완벽합니다!"
